name: Build Kode Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to use (example: v0.3.5)"
        required: true
        type: string
      create_tag:
        description: "Create and push this tag from current commit"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_ext: .exe
            archive_ext: zip
          - os: windows-latest
            goos: windows
            goarch: arm64
            binary_ext: .exe
            archive_ext: zip

    env:
      PKG_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || (github.event_name == 'workflow_dispatch' && inputs.release_tag) || format('build-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="kode${{ matrix.binary_ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o "dist/${BIN_NAME}" ./cmd/kode

      - name: Package binary (Linux/macOS)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          BIN_NAME="kode${{ matrix.binary_ext }}"
          ARCHIVE_NAME="kode-${PKG_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          tar -C dist -czf "dist/${ARCHIVE_NAME}" "${BIN_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $binName = "kode${{ matrix.binary_ext }}"
          $archiveName = "kode-$env:PKG_VERSION-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "dist/$binName" -DestinationPath "dist/$archiveName" -Force
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate checksum (Linux/macOS)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          CHECKSUM_FILE="${ARCHIVE_NAME}.sha256"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ARCHIVE_NAME}" > "dist/${CHECKSUM_FILE}"
          else
            shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${CHECKSUM_FILE}"
          fi
          echo "CHECKSUM_FILE=${CHECKSUM_FILE}" >> "$GITHUB_ENV"

      - name: Generate checksum (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $checksumFile = "$env:ARCHIVE_NAME.sha256"
          $hash = (Get-FileHash -Path "dist/$env:ARCHIVE_NAME" -Algorithm SHA256).Hash.ToLower()
          "$hash  $env:ARCHIVE_NAME" | Out-File -FilePath "dist/$checksumFile" -Encoding ascii
          "CHECKSUM_FILE=$checksumFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kode-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.CHECKSUM_FILE }}
          if-no-files-found: error

  release:
    name: Create Release and Upload Assets
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag from workflow input
        if: github.event_name == 'workflow_dispatch' && inputs.create_tag == true
        run: |
          TAG_NAME="${{ inputs.release_tag }}"
          if [[ -z "${TAG_NAME}" ]]; then
            echo "release_tag is required"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "refs/tags/${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} already exists on origin. Skipping tag creation."
          else
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kode-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Kode ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          body: |
            Automated release for ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}.

            Included assets:
            - Linux amd64 and arm64 binaries
            - macOS amd64 and arm64 binaries
            - Windows amd64 and arm64 binaries
            - SHA256 checksum files for each package
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

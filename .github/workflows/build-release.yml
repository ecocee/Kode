name: Build Kode Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_ext: .exe
            archive_ext: zip
          - os: windows-latest
            goos: windows
            goarch: arm64
            binary_ext: .exe
            archive_ext: zip

    env:
      PKG_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="kode${{ matrix.binary_ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o "dist/${BIN_NAME}" ./cmd/kode

      - name: Package binary
        shell: bash
        run: |
          BIN_NAME="kode${{ matrix.binary_ext }}"
          ARCHIVE_NAME="kode-${PKG_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            cd dist
            zip -q "${ARCHIVE_NAME}" "${BIN_NAME}"
            cd -
          else
            tar -C dist -czf "dist/${ARCHIVE_NAME}" "${BIN_NAME}"
          fi
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Generate checksum
        shell: bash
        run: |
          CHECKSUM_FILE="${ARCHIVE_NAME}.sha256"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ARCHIVE_NAME}" > "dist/${CHECKSUM_FILE}"
          else
            shasum -a 256 "dist/${ARCHIVE_NAME}" > "dist/${CHECKSUM_FILE}"
          fi
          echo "CHECKSUM_FILE=${CHECKSUM_FILE}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kode-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.CHECKSUM_FILE }}
          if-no-files-found: error

  release:
    name: Create Release and Upload Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kode-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kode ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}.

            Included assets:
            - Linux amd64 and arm64 binaries
            - macOS amd64 and arm64 binaries
            - Windows amd64 and arm64 binaries
            - SHA256 checksum files for each package
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kode HTTP Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.5rem;
      font-size: 1.05rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    input, textarea {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #6ee7f7;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      border: none;
      border-radius: 8px;
      color: #0f1117;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .output {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.8rem;
      font-family: monospace;
      font-size: 0.9rem;
      color: #6ee7f7;
      min-height: 2.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    footer {
      color: #4a5568;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>&#x26A1; Kode HTTP Server</h1>
    <p>A real production HTTP server written in the Kode language</p>
  </header>

  <div class="card-grid">

    <!-- Hello endpoint -->
    <div class="card">
      <h2>GET /api/hello</h2>
      <div style="display:flex;gap:0.5rem">
        <input id="nameInput" type="text" placeholder="Your name (optional)" />
        <button onclick="sayHello()">Send</button>
      </div>
      <div class="output" id="helloOut">Response will appear here…</div>
    </div>

    <!-- Echo endpoint -->
    <div class="card">
      <h2>POST /api/echo</h2>
      <textarea id="echoBody" placeholder="Type anything to echo back…"></textarea>
      <button onclick="doEcho()">Echo</button>
      <div class="output" id="echoOut">Response will appear here…</div>
    </div>

    <!-- JSON Info endpoint -->
    <div class="card">
      <h2>GET /api/info</h2>
      <button onclick="getInfo()">Fetch Server Info</button>
      <div class="output" id="infoOut">Response will appear here…</div>
    </div>

  </div>

  <footer>Running on <strong>Kode</strong> &mdash; powered by <code>http.newServer()</code></footer>

  <script>
    async function sayHello() {
      const name = document.getElementById('nameInput').value.trim()
      const url = name ? `/api/hello?name=${encodeURIComponent(name)}` : '/api/hello'
      const out = document.getElementById('helloOut')
      try {
        const res = await fetch(url)
        const text = await res.text()
        out.textContent = text
      } catch (e) { out.textContent = 'Error: ' + e.message }
    }

    async function doEcho() {
      const body = document.getElementById('echoBody').value
      const out = document.getElementById('echoOut')
      try {
        const res = await fetch('/api/echo', { method: 'POST', body })
        const text = await res.text()
        out.textContent = text
      } catch (e) { out.textContent = 'Error: ' + e.message }
    }

    async function getInfo() {
      const out = document.getElementById('infoOut')
      try {
        const res = await fetch('/api/info')
        const json = await res.json()
        out.textContent = JSON.stringify(json, null, 2)
      } catch (e) { out.textContent = 'Error: ' + e.message }
    }
  </script>
</body>
</html>
